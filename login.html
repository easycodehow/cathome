<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - CatHome</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

  <!-- ===== 상단 띠배너 ===== -->
  <div class="top-banner">
    <a href="#">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      </svg>
      이번 주 행사 이벤트 모아보기 →
    </a>
  </div>

  <!-- ===== 헤더 (로고만) ===== -->
  <header class="login-header">
    <a href="index.html" class="header-logo">
      <span class="logo-cat">CAT</span><span class="logo-home">HOME</span>
    </a>
  </header>

  <!-- ===== 로그인/회원가입 폼 ===== -->
  <main class="login-main">
    <div class="login-box">

      <!-- 탭 -->
      <div class="login-tabs">
        <button class="login-tab active" id="tabLogin">로그인</button>
        <button class="login-tab" id="tabSignup">회원가입</button>
      </div>

      <!-- 메시지 영역 -->
      <div class="login-msg" id="loginMsg"></div>

      <!-- 로그인 폼 -->
      <form class="login-form" id="formLogin" autocomplete="off">
        <div class="form-group">
          <label for="loginEmail">이메일</label>
          <input type="email" id="loginEmail" placeholder="이메일을 입력하세요" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="loginPassword">비밀번호</label>
          <input type="password" id="loginPassword" placeholder="비밀번호를 입력하세요" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-submit">로그인</button>
      </form>

      <!-- 회원가입 폼 -->
      <form class="login-form hidden" id="formSignup" autocomplete="off">
        <div class="form-group">
          <label for="signupEmail">이메일</label>
          <input type="email" id="signupEmail" placeholder="이메일을 입력하세요" autocomplete="off" required>
        </div>
        <div class="form-group">
          <label for="signupPassword">비밀번호</label>
          <input type="password" id="signupPassword" placeholder="비밀번호 (6자 이상)" autocomplete="new-password" required minlength="6">
        </div>
        <div class="form-group">
          <label for="signupNickname">닉네임</label>
          <input type="text" id="signupNickname" placeholder="닉네임을 입력하세요" autocomplete="off" required>
        </div>
        <button type="submit" class="btn-submit">회원가입</button>
      </form>

    </div>
  </main>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/login.js"></script>

</body>
</html>
